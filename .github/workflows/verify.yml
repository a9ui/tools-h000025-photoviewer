name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify project
        shell: pwsh
        run: |
          if (Test-Path .\scripts\verify-project.ps1) {
            powershell -ExecutionPolicy Bypass -File .\scripts\verify-project.ps1
          } else {
            Write-Host "No project verifier yet."
          }
