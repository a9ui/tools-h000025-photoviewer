name: verify

on:
  pull_request:
  push:
    branches: [main]

jobs:
  verify:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - name: Install
        shell: pwsh
        run: pnpm install --frozen-lockfile
      - name: Verify
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File .\scripts\verify-project.ps1
