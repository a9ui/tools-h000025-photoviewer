[project]
id = "H000025"
name = "PhotoViewer"
kind = "H"

[commands]
setup = "pnpm install --frozen-lockfile"
dev = "pnpm dev"
verify = "powershell -ExecutionPolicy Bypass -File .\\scripts\\verify-project.ps1"
wpf_build = "dotnet build .\\local-native\\PhotoViewer.Wpf\\PhotoViewer.Wpf.csproj -c Release --nologo"

[links]
github = "https://github.com/a9ui/tools-h000025-photoviewer"
planned_public_github = "https://github.com/a9ui/H000025-PhotoViewer"
security = "https://github.com/a9ui/tools-h000025-photoviewer/security/advisories/new"
deployment = ""
production = ""

[publication]
target_repository = "a9ui/H000025-PhotoViewer"
source_visibility = "private-until-final-gate"
runtime_exposure = "loopback-only"
deployment_supported = false

[workflow]
source_of_truth = "github"
public_issue_tracking = true
private_security_reporting = true
